<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trend Analytics | SportSight</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/themes.css' %}">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }

    .topbar {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }

    .stat-card {
      border-radius: 20px;
      padding: 28px;
    }

    .stat-card label {
      font-size: 1rem;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .stat-card .val {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .chart-panel {
      border-radius: 24px;
      padding: 36px;
    }

    .chart-panel h3 {
      font-size: var(--font-size-h3);
      margin-bottom: 24px;
    }

    .chart-wrapper {
      height: 450px;
      width: 100%;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="nav-left">
      <b style="font-size: 24px;">📈 Performance Trend Map</b>
      <button class="theme-toggle" id="theme-toggle">🌓</button>
    </div>
    <a href="/dashboard/">← Back to Dashboard</a>
  </div>

  <div class="container">
    <div class="cards-grid">
      <div class="stat-card card">
        <label class="muted-text">Analyzed Matches</label>
        <div class="val">{{ total_entries }}</div>
      </div>
      <div class="stat-card card">
        <label class="muted-text">Primary Metric</label>
        <div class="val" style="color: #3b82f6;">Goals Trend</div>
      </div>
      <div class="stat-card card">
        <label class="muted-text">Resolution</label>
        <div class="val" style="color: #10b981;">Per Match</div>
      </div>
    </div>

    <div class="chart-panel card">
      <h3>📈 Team Scoring Progression</h3>
      <div class="chart-wrapper">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    {{ labels|json_script:"labels-data" }}
    {{ goals|json_script:"goals-data" }}
  </div>

  <script src="{% static 'js/themes.js' %}"></script>
  <script>
    const labels = JSON.parse(document.getElementById("labels-data").textContent);
    const goals = JSON.parse(document.getElementById("goals-data").textContent);
    const initialTheme = localStorage.getItem('theme') || 'dark';

    function getThemeColors(theme) {
      return {
        text: theme === 'light' ? '#0f172a' : '#cbd5e1',
        muted: theme === 'light' ? '#64748b' : '#94a3b8',
        grid: theme === 'light' ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)'
      };
    }

    const ctx = document.getElementById("trendChart").getContext('2d');
    let themeColors = getThemeColors(initialTheme);

    let gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
    gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Goals scored in Match",
          data: goals,
          borderColor: "#3b82f6",
          backgroundColor: gradient,
          borderWidth: 3,
          pointBackgroundColor: '#60a5fa',
          pointBorderWidth: 2,
          pointBorderColor: '#fff',
          pointRadius: 6,
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0f172a',
            padding: 12,
            cornerRadius: 10
          }
        },
        scales: {
          y: {
            grid: { color: themeColors.grid },
            beginAtZero: true,
            ticks: { color: themeColors.muted, font: { size: 14 } }
          },
          x: {
            grid: { display: false },
            ticks: { color: themeColors.text, font: { size: 14, weight: '600' } }
          }
        }
      }
    });

    window.addEventListener('themeChanged', (e) => {
      const colors = getThemeColors(e.detail.theme);
      chart.options.scales.y.grid.color = colors.grid;
      chart.options.scales.y.ticks.color = colors.muted;
      chart.options.scales.x.ticks.color = colors.text;
      chart.update();
    });
  </script>
</body>

</html>
