<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | SportSight Analytics</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/themes.css' %}">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(60px);
    }

    .card {
      width: 100%;
      max-width: 500px;
      /* Increased from 480px */
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 32px;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input,
    select {
      width: 100%;
      border-radius: 12px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 15px;
      transition: 0.3s;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #3b82f6 !important;
      background: var(--accent-glow) !important;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    select option {
      background: #0f172a;
      color: white;
    }

    button.submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.3s;
    }

    button.submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }

    .link-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
    }

    .link-footer a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
    }

    .messages div {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
    }

    .theme-toggle-reg {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <button class="theme-toggle theme-toggle-reg" id="theme-toggle">🌓</button>

  <div class="card">
    <div class="logo">SportSight</div>
    <h2>Create Account</h2>
    <p class="subtitle">Join the elite analytics platform</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div>{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input name="username" placeholder="Choose a unique username" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="user">Player / User</option>
          <option value="admin">Administrator / Coach</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="submit-btn">Complete Registration</button>
    </form>

    <div class="link-footer">
      Already have an account? <a href="{% url 'login' %}">Sign In</a>
    </div>
  </div>

  <script src="{% static 'js/themes.js' %}"></script>
</body>

</html>
